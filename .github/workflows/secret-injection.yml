name: Inject Mapbox token and deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Mapbox secret file
        run: |
          mkdir -p js
          cat > js/secrets.js <<'EOF'
          window.MAPBOX_TOKEN = "${{ secrets.MAPBOX_TOKEN }}";
          window.WARNING_MESSAGE = 'Please Provide a Mapbox Token in order to use Kepler.gl. Edit this repository secret MAPBOX_TOKEN with your access key';
          EOF

      - name: Deploy site to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
